name: agentforge-enterprise
version: "1.0.0"
description: >
  AgentForge enterprise agent development accelerator.
  Design Agent with 4 meta-skills reasons about architecture,
  generates cosign-signed design-contract.md + .json,
  and skill-constrained /implement generates production-ready code.

archetype: agentic

commands:
  - prompts/specify.md
  - prompts/plan.md
  - prompts/design.md
  - prompts/validate.md
  - prompts/tasks.md
  - prompts/implement.md

templates:
  spec: templates/spec-template.md
  plan: templates/plan-template.md
  tasks: templates/tasks-template.md
  deployment: templates/deployment-guide-template.md
  disaster_recovery: templates/disaster-recovery-template.md
  hadr_diagram: templates/hadr-diagram.mermaid

meta_skills:    # Loaded into Design Agent LlmAgent via SkillToolset
  - meta-skills/pattern-composition/SKILL.md
  - meta-skills/data-platform-selection/SKILL.md
  - meta-skills/agent-boundary/SKILL.md
  - meta-skills/skill-tool-discovery/SKILL.md

# Discovery corpus (the archetype swap point — see ADR-AF-002):
#   Patterns/skills/tools live in Vertex AI Search data stores; deployed agents in
#   Agent Registry. Meta-skills RETRIEVE from these via search_patterns/skills/tools/agents.
#   Switching archetype = re-point data stores + register a domain skill. NO meta-skill edits.
discovery_corpus:
  pattern_catalog:  vertex-ai-search://agentforge/patterns
  skill_catalog:    vertex-ai-search://agentforge/skills
  tool_registry:    vertex-ai-search://agentforge/tools
  agent_registry:   agent-registry://agentforge/agents   # search_agents: Agent Card semantic search

skills:         # Loaded into coding agent during /implement
  domain:
    - name: adk-agents
      version: "2.0.0"          # Google ADK (google-adk) only — see skills/adk-agents/SKILL.md
      source: github.com/anchorops/skills/adk-agents
    - name: adk-tools
      version: "2.0.0"          # ADK FunctionTool / MCPToolset / A2A
      source: github.com/anchorops/skills/adk-tools
  overlay:
    - name: company-terraform
      version: "2.0.0"
      source: github.com/anchorops/skills/company-terraform
    - name: company-observability
      version: "1.3.0"
      source: github.com/anchorops/skills/company-observability
    - name: company-cicd
      version: "1.5.0"
      source: github.com/anchorops/skills/company-cicd
    - name: company-security
      version: "1.2.0"
      source: github.com/anchorops/skills/company-security

settings:
  coding_agents: [copilot, claude-code, gemini-cli, cursor, windsurf]
  output_format: markdown
  save_location: workspace_root

enforcement:    # Generated by /implement from skill ## Validation Hook sections
  framework: pre-commit     # Open-source, MIT license (pre-commit.com)
  generated_outputs:
    - hooks/check_tf_modules.py       # From S3 company-terraform validation hook
    - hooks/check_model_armor.py      # From S6 company-security validation hook
    - hooks/check_otel.py             # From S4 company-observability validation hook
    - hooks/check_secrets.py          # From S6 company-security validation hook
    - hooks/check_identity.py         # From S3 company-terraform validation hook
    - hooks/check_golden_dataset.py   # From S5 company-cicd validation hook
    - hooks/check_source_hash.py      # From prompts/implement.md Step 0
    - .pre-commit-config.yaml         # References all hooks above
