# .pre-commit-config.yaml (generated by /implement from skill validation hooks)
repos:
  - repo: local
    hooks:
      - id: agentforge-tf-modules-only
        name: "Terraform: company modules only (no raw resources)"
        entry: python hooks/check_tf_modules.py
        language: python
        files: \.tf$

      - id: agentforge-model-armor
        name: "Security: Model Armor callbacks registered on all agents"
        entry: python hooks/check_model_armor.py
        language: python
        files: app/agents/.*\.py$

      - id: agentforge-otel-spans
        name: "Observability: OTel instrumentation on all agents"
        entry: python hooks/check_otel.py
        language: python
        files: app/agents/.*\.py$

      - id: agentforge-no-secrets
        name: "Security: no hardcoded credentials"
        entry: python hooks/check_secrets.py
        language: python

      - id: agentforge-identity-check
        name: "Identity: least-privilege capabilities match tool bindings"
        entry: python hooks/check_identity.py
        language: python
        files: deployment/terraform/identity/.*\.tf$

      - id: agentforge-golden-dataset
        name: "EvalOps: golden dataset coverage ≥10 entries per agent"
        entry: python hooks/check_golden_dataset.py
        language: python
        files: eval/golden-dataset\.json$

      - id: agentforge-source-hash
        name: "Governance: design-contract.json not manually modified"
        entry: python hooks/check_source_hash.py
        language: python
        files: design-contract\.json$
